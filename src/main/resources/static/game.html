<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Name Game</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1c1f2e;
      --card: #252840;
      --accent: #6c63ff;
      --accent-hover: #857dff;
      --success: #22c55e;
      --error: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
      --radius: 14px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; }
    h1 span { color: var(--accent); }

    .subtitle { color: var(--muted); margin-top: 6px; font-size: 0.95rem; }

    /* ── SCREENS ── */
    .screen { display: none; width: 100%; max-width: 780px; }
    .screen.active { display: flex; flex-direction: column; align-items: center; gap: 28px; }

    /* ── START SCREEN ── */
    .config-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .field label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .field input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .field .range-val {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      text-align: center;
      margin-top: 4px;
    }

    /* ── BUTTONS ── */
    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, transform .1s;
      width: 100%;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { background: var(--muted); cursor: not-allowed; }
    .btn-ghost {
      background: transparent;
      border: 2px solid var(--muted);
      color: var(--muted);
    }
    .btn-ghost:hover { border-color: var(--text); color: var(--text); }

    /* ── PROGRESS ── */
    .progress-bar {
      width: 100%;
      height: 6px;
      background: var(--surface);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width .4s ease;
    }

    .round-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .timer {
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      color: var(--text);
    }

    /* ── TARGET NAME ── */
    .target-box {
      text-align: center;
    }
    .target-label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .target-name  { font-size: 2rem; font-weight: 800; margin-top: 4px; }

    /* ── FACES GRID ── */
    .faces-grid {
      display: grid;
      gap: 16px;
      width: 100%;
    }
    .faces-grid.n2 { grid-template-columns: repeat(2, 1fr); }
    .faces-grid.n3 { grid-template-columns: repeat(3, 1fr); }
    .faces-grid.n4 { grid-template-columns: repeat(4, 1fr); }
    .faces-grid.n5 { grid-template-columns: repeat(5, 1fr); }
    .faces-grid.n6 { grid-template-columns: repeat(3, 1fr); }

    .face-card {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      border: 3px solid transparent;
      transition: border-color .15s, transform .15s, box-shadow .15s;
      position: relative;
    }
    .face-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.4); }
    .face-card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent);
    }
    .face-card.correct  { border-color: var(--success); }
    .face-card.wrong    { border-color: var(--error); opacity: .5; }
    .face-card.revealed { border-color: var(--success); }

    .face-card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }

    .face-check {
      display: none;
      position: absolute;
      top: 8px; right: 8px;
      width: 28px; height: 28px;
      border-radius: 50%;
      font-size: 14px;
      font-weight: 800;
      align-items: center;
      justify-content: center;
    }
    .face-card.correct  .face-check { display: flex; background: var(--success); color: #fff; }
    .face-card.wrong    .face-check { display: flex; background: var(--error);   color: #fff; }
    .face-card.revealed .face-check { display: flex; background: var(--success); color: #fff; }

    /* ── FEEDBACK BANNER ── */
    .feedback {
      width: 100%;
      border-radius: var(--radius);
      padding: 16px 22px;
      display: none;
      flex-direction: column;
      gap: 4px;
    }
    .feedback.show { display: flex; }
    .feedback.correct-fb { background: rgba(34,197,94,.15); border: 1px solid var(--success); }
    .feedback.wrong-fb   { background: rgba(239,68,68,.15);  border: 1px solid var(--error); }

    .feedback-title { font-weight: 800; font-size: 1.1rem; }
    .feedback.correct-fb .feedback-title { color: var(--success); }
    .feedback.wrong-fb   .feedback-title { color: var(--error); }
    .feedback-detail { font-size: 0.88rem; color: var(--muted); }

    /* ── RESULTS SCREEN ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      width: 100%;
    }

    .stat-box {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
    }
    .stat-value { font-size: 2.2rem; font-weight: 800; }
    .stat-value.green { color: var(--success); }
    .stat-value.red   { color: var(--error); }
    .stat-label { font-size: 0.8rem; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: .5px; }

    .rounds-list { width: 100%; display: flex; flex-direction: column; gap: 8px; }

    .round-row {
      background: var(--surface);
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .round-icon {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; flex-shrink: 0;
    }
    .round-icon.ok  { background: rgba(34,197,94,.2); color: var(--success); }
    .round-icon.bad { background: rgba(239,68,68,.2);  color: var(--error); }

    .round-info { flex: 1; }
    .round-info strong { font-size: 0.95rem; }
    .round-info small  { display: block; color: var(--muted); font-size: 0.8rem; margin-top: 1px; }
    .round-time { font-size: 0.85rem; color: var(--muted); font-variant-numeric: tabular-nums; }

    /* ── SPINNER ── */
    .spinner {
      width: 36px; height: 36px;
      border: 4px solid var(--surface);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: rgba(239,68,68,.15);
      border: 1px solid var(--error);
      color: var(--error);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.9rem;
      width: 100%;
      text-align: center;
    }
  </style>
</head>
<body>

<!-- ══ START SCREEN ══ -->
<div id="screen-start" class="screen active">
  <div style="text-align:center">
    <h1>The <span>Name</span> Game</h1>
    <p class="subtitle">¿Podés reconocer a quién pertenece cada rostro?</p>
  </div>

  <div class="config-card">
    <div class="field">
      <label>Rondas</label>
      <input type="range" id="cfg-rounds" min="1" max="10" value="5"
             oninput="document.getElementById('val-rounds').textContent=this.value" />
      <div class="range-val" id="val-rounds">5</div>
    </div>
    <div class="field">
      <label>Rostros por ronda</label>
      <input type="range" id="cfg-faces" min="2" max="6" value="4"
             oninput="document.getElementById('val-faces').textContent=this.value" />
      <div class="range-val" id="val-faces">4</div>
    </div>
    <div id="start-error" class="error-msg" style="display:none"></div>
    <button class="btn btn-primary" id="btn-start" onclick="startGame()">Comenzar partida</button>
  </div>
</div>

<!-- ══ LOADING ══ -->
<div id="screen-loading" class="screen">
  <div class="spinner"></div>
  <p style="color:var(--muted)">Cargando...</p>
</div>

<!-- ══ ROUND SCREEN ══ -->
<div id="screen-round" class="screen">
  <div class="round-meta">
    <span id="round-label">Ronda 1 de 5</span>
    <span class="timer" id="timer">0.0s</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <div class="target-box">
    <div class="target-label">¿Quién es?</div>
    <div class="target-name" id="target-name">—</div>
  </div>

  <div class="faces-grid" id="faces-grid"></div>

  <div class="feedback" id="feedback"></div>

  <button class="btn btn-primary" id="btn-continue"
          onclick="handleContinue()" disabled>Continuar</button>
</div>

<!-- ══ RESULTS SCREEN ══ -->
<div id="screen-results" class="screen">
  <div style="text-align:center">
    <h1>Resultados</h1>
    <p class="subtitle" id="results-subtitle"></p>
  </div>

  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-value green" id="stat-correct">—</div>
      <div class="stat-label">Correctas</div>
    </div>
    <div class="stat-box">
      <div class="stat-value red" id="stat-incorrect">—</div>
      <div class="stat-label">Incorrectas</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="stat-pct">—</div>
      <div class="stat-label">% Aciertos</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="stat-avg">—</div>
      <div class="stat-label">Tiempo promedio</div>
    </div>
  </div>

  <div class="rounds-list" id="rounds-list"></div>

  <button class="btn btn-primary" onclick="resetGame()" style="max-width:280px">Jugar de nuevo</button>
</div>

<script>
  const API = 'http://192.168.0.11:8080';

  let gameId       = null;
  let roundNumber  = 1;
  let totalRounds  = 5;
  let selectedId   = null;
  let roundStart   = null;
  let timerHandle  = null;
  let answered     = false;
  let hasNextRound = false;

  // ── Pantallas ──────────────────────────────────────────
  function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ── Timer visual ──────────────────────────────────────
  function startTimer() {
    roundStart = Date.now();
    clearInterval(timerHandle);
    timerHandle = setInterval(() => {
      const s = ((Date.now() - roundStart) / 1000).toFixed(1);
      document.getElementById('timer').textContent = s + 's';
    }, 100);
  }
  function stopTimer() { clearInterval(timerHandle); }

  // ── START ──────────────────────────────────────────────
  async function startGame() {
    totalRounds = +document.getElementById('cfg-rounds').value;
    const facesPerRound = +document.getElementById('cfg-faces').value;

    document.getElementById('start-error').style.display = 'none';
    document.getElementById('btn-start').disabled = true;
    show('screen-loading');

    try {
      const res = await fetch(`${API}/api/v1/games`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ totalRounds, facesPerRound })
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || `Error ${res.status}`);
      }
      const data = await res.json();
      gameId      = data.gameId;
      roundNumber = data.currentRound ?? 1;
      totalRounds = data.totalRounds;
      await loadRound();
    } catch (e) {
      show('screen-start');
      document.getElementById('btn-start').disabled = false;
      const el = document.getElementById('start-error');
      el.textContent = e.message;
      el.style.display = 'block';
    }
  }

  // ── LOAD ROUND ────────────────────────────────────────
  async function loadRound() {
    show('screen-loading');
    selectedId   = null;
    answered     = false;
    hasNextRound = false;

    const res = await fetch(`${API}/api/v1/games/${gameId}/rounds/${roundNumber}`);
    if (!res.ok) throw new Error(`Error cargando ronda ${roundNumber}`);
    const round = await res.json();

    // Meta
    document.getElementById('round-label').textContent =
      `Ronda ${roundNumber} de ${round.totalRounds ?? totalRounds}`;
    document.getElementById('target-name').textContent = round.targetName;

    const pct = ((roundNumber - 1) / (round.totalRounds ?? totalRounds)) * 100;
    document.getElementById('progress-fill').style.width = pct + '%';

    // Faces grid
    const grid = document.getElementById('faces-grid');
    grid.innerHTML = '';
    const n = round.faces.length;
    grid.className = `faces-grid n${Math.min(n, 6)}`;

    round.faces.forEach(face => {
      const card = document.createElement('div');
      card.className = 'face-card';
      card.dataset.id = face.personId;
      card.innerHTML = `
        <img src="${face.photoUrl}" alt="persona" loading="lazy"
             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 1 1%22><rect fill=%22%23252840%22 width=%221%22 height=%221%22/></svg>'" />
        <div class="face-check">✓</div>`;
      card.addEventListener('click', () => selectFace(card, face.personId));
      grid.appendChild(card);
    });

    // Feedback & button
    const fb = document.getElementById('feedback');
    fb.className = 'feedback';
    fb.innerHTML = '';
    document.getElementById('btn-continue').disabled = true;
    document.getElementById('timer').textContent = '0.0s';

    show('screen-round');
    startTimer();
  }

  // ── SELECT FACE ───────────────────────────────────────
  function selectFace(card, personId) {
    if (answered) return;
    selectedId = personId;
    document.querySelectorAll('.face-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    document.getElementById('btn-continue').disabled = false;
  }

  // ── CONTINUE (submit answer) ───────────────────────────
  async function handleContinue() {
    if (answered) {
      // Ya respondimos → avanzar según lo que dijo el backend
      if (hasNextRound) {
        await loadRound();
      } else {
        await loadResults();
      }
      return;
    }

    if (!selectedId) return;
    answered = true;
    stopTimer();
    document.getElementById('btn-continue').disabled = true;

    const clientTimestamp = new Date().toISOString();
    try {
      const res = await fetch(
        `${API}/api/v1/games/${gameId}/rounds/${roundNumber}/answer`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ selectedPersonId: selectedId, clientTimestamp })
        }
      );
      const result = await res.json();
      if (!res.ok) throw new Error(result.message || `Error ${res.status}`);
      showFeedback(result);
    } catch (e) {
      answered = false;
      document.getElementById('btn-continue').disabled = false;
      alert('Error al enviar respuesta: ' + e.message);
    }
  }

  // ── SHOW FEEDBACK ─────────────────────────────────────
  function showFeedback(result) {
    // Colorear tarjetas
    document.querySelectorAll('.face-card').forEach(card => {
      const id = card.dataset.id;
      if (id === result.targetPersonId?.toString()) {
        card.classList.remove('selected');
        card.classList.add(result.correct ? 'correct' : 'revealed');
        card.querySelector('.face-check').textContent = '✓';
      } else if (id === result.selectedPersonId?.toString() && !result.correct) {
        card.classList.remove('selected');
        card.classList.add('wrong');
        card.querySelector('.face-check').textContent = '✗';
      }
    });

    // Banner de feedback
    const fb = document.getElementById('feedback');
    const secs = result.reactionTimeMillis
      ? (result.reactionTimeMillis / 1000).toFixed(2) + 's'
      : '—';

    if (result.correct) {
      fb.className = 'feedback correct-fb show';
      fb.innerHTML = `
        <span class="feedback-title">✓ ¡Correcto!</span>
        <span class="feedback-detail">Era ${result.targetName} · Tiempo: ${secs}</span>`;
    } else {
      fb.className = 'feedback wrong-fb show';
      fb.innerHTML = `
        <span class="feedback-title">✗ Incorrecto</span>
        <span class="feedback-detail">Era <strong>${result.targetName}</strong>,
          vos elegiste ${result.selectedName ?? '—'} · Tiempo: ${secs}</span>`;
    }

    // Guardar si hay siguiente ronda y actualizar roundNumber
    hasNextRound = result.hasNextRound;
    if (result.hasNextRound) {
      roundNumber = result.nextRoundNumber;
    }

    // Botón para avanzar
    const btn = document.getElementById('btn-continue');
    btn.disabled = false;
    btn.textContent = result.hasNextRound ? 'Siguiente ronda →' : 'Ver resultados';
  }

  // ── RESULTS ───────────────────────────────────────────
  async function loadResults() {
    show('screen-loading');
    const res = await fetch(`${API}/api/v1/games/${gameId}/results`);
    const data = await res.json();
    if (!res.ok) {
      alert('Error al cargar resultados: ' + (data.message || res.status));
      show('screen-round');
      return;
    }

    document.getElementById('results-subtitle').textContent =
      `Partida completada · ${(data.totalTimeMillis / 1000).toFixed(1)}s total`;

    document.getElementById('stat-correct').textContent   = data.correctAnswers;
    document.getElementById('stat-incorrect').textContent = data.incorrectAnswers;
    document.getElementById('stat-pct').textContent =
      data.correctPercentage.toFixed(0) + '%';
    document.getElementById('stat-avg').textContent =
      (data.averageReactionTimeMillis / 1000).toFixed(2) + 's';

    const list = document.getElementById('rounds-list');
    list.innerHTML = '';
    (data.rounds ?? []).forEach(r => {
      const ok = r.correct;
      list.innerHTML += `
        <div class="round-row">
          <div class="round-icon ${ok ? 'ok' : 'bad'}">${ok ? '✓' : '✗'}</div>
          <div class="round-info">
            <strong>${r.targetName ?? '—'}</strong>
            <small>${ok ? 'Correcto' : `Elegiste: ${r.selectedName ?? '—'}`}</small>
          </div>
          <span class="round-time">${r.reactionTimeMillis
            ? (r.reactionTimeMillis / 1000).toFixed(2) + 's'
            : '—'}</span>
        </div>`;
    });

    show('screen-results');
  }

  // ── RESET ─────────────────────────────────────────────
  function resetGame() {
    gameId = null;
    roundNumber = 1;
    selectedId  = null;
    answered    = false;
    stopTimer();
    document.getElementById('btn-start').disabled = false;
    document.getElementById('btn-continue').textContent = 'Continuar';
    show('screen-start');
  }
</script>
</body>
</html>
